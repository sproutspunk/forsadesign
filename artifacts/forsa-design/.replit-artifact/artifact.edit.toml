kind = "web"
previewPath = "/"
title = "Forsa Design"
version = "1.0.0"
id = "artifacts/forsa-design"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20815

[services.development]
run = "pnpm --filter @workspace/forsa-design run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/forsa-design", "run", "build" ]
publicDir = "artifacts/forsa-design/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20815"
BASE_PATH = "/"
