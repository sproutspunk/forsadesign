name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm --filter @workspace/forsa-design run build
        env:
          NODE_ENV: production
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}

      - name: Sync secrets to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          printf '%s' "${{ secrets.PROTON_SMTP_USER }}"     | pnpm exec wrangler pages secret put PROTON_SMTP_USER     --project-name=forsadesign
          printf '%s' "${{ secrets.PROTON_SMTP_PASS }}"     | pnpm exec wrangler pages secret put PROTON_SMTP_PASS     --project-name=forsadesign
          printf '%s' "${{ secrets.PROTON_SMTP_HOST }}"     | pnpm exec wrangler pages secret put PROTON_SMTP_HOST     --project-name=forsadesign
          printf '%s' "${{ secrets.PROTON_SMTP_PORT }}"     | pnpm exec wrangler pages secret put PROTON_SMTP_PORT     --project-name=forsadesign
          printf '%s' "${{ secrets.TURNSTILE_SECRET_KEY }}" | pnpm exec wrangler pages secret put TURNSTILE_SECRET_KEY --project-name=forsadesign

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          export CLOUDFLARE_API_TOKEN
          pnpm exec wrangler pages deploy artifacts/forsa-design/dist/public --project-name=forsadesign --commit-dirty=true
