name: Test Cloudflare Token
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test token
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"             "https://api.cloudflare.com/client/v4/user/tokens/verify" | jq .
      - name: List accounts
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"             "https://api.cloudflare.com/client/v4/accounts?per_page=10" | jq '.result | map({id: .id, name: .name})'
